<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Grid Assignment</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

    <!-- Header -->
    <div class="container text-center mt-5">

        <h1 class="mb-4">Bootsrap-HW</h1>

        <p class="lead">
            This page shows Bootstrap containers, rows, columns,
            cards, and responsive grids.
        </p>

    </div>


    <!-- Grid Section -->
    <div class="container mt-5">

        <div class="row g-4">

            <!-- Column 1 -->
            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h3 class="card-title">Column 1</h3>

                        <p class="card-text">
                            This is the first Bootstrap column.
                        </p>

                    </div>

                </div>

            </div>


            <!-- Column 2 -->
            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h3 class="card-title">Column 2</h3>

                        <p class="card-text">
                            This is the second Bootstrap column.
                        </p>

                    </div>

                </div>

            </div>


            <!-- Column 3 -->
            <div class="col-md-4">

                <div class="card shadow-sm">

                    <div class="card-body">

                        <h3 class="card-title">Column 3</h3>

                        <p class="card-text">
                            This is the third Bootstrap column.
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>


    <!-- Second Grid Row -->
    <div class="container mt-5 mb-5">

        <div class="row text-center">

            <div class="col-sm-6 bg-primary text-white p-4">
                Left Side
            </div>

            <div class="col-sm-6 bg-success text-white p-4">
                Right Side
            </div>

        </div>

    </div>


    <!-- Return Link -->
    <div class="text-center mb-5">

        <a href="https://github.com/jonibeksaidov/CISC-3610-Jonibek-Saidov">
            Return to Main Page
        </a>

    </div>

</body>

</html>
