<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multimedia Dictionary</title>

    <style>

        /* Page Styling */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 40px;
        }

        /* Main Headings */
        h1 {
            color: #222;
        }

        h3 {
            color: #444;
        }

        /* Dropdown Menu */
        select {
            padding: 10px;
            width: 220px;
            font-size: 16px;
        }

        /* Sentence Box */
        textarea {
            width: 350px;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            resize: none;
        }

        /* Buttons */
        button {
            padding: 10px 15px;
            background-color: #444;
            color: white;
            border: none;
            cursor: pointer;
            margin-left: 10px;
            border-radius: 5px;
        }

        /* Button Hover Effect */
        button:hover {
            background-color: #222;
        }

        /* Return Link */
        a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <!-- Page Title -->
    <h1>Multimedia Dictionary</h1>

    <!-- Word Selection Section -->
    <h3>Select a Word</h3>

    <select id="wordMenu" onchange="showSentence()">

        <option>-- Select a Word --</option>

        <option value="Orange"
            data-sentence="I like to drink sweet orange juice.">
            Orange
        </option>

        <option value="Dog"
            data-sentence="The dog likes to play outside.">
            Dog
        </option>

        <option value="Soccer"
            data-sentence="I like to play soccer everyday.">
            Soccer
        </option>

        <option value="Car"
            data-sentence="The car is very fast.">
            Car
        </option>

        <option value="Tree"
            data-sentence="The tree has green leaves.">
            Tree
        </option>

    </select>

    <!-- Speak Word Button -->
    <button onclick="speakWord()">Speak Word</button>

    <br><br>

    <!-- Sentence Display Section -->
    <h3>Sentence</h3>

    <textarea id="sentenceBox" readonly></textarea>

    <br><br>

    <!-- Speak Sentence Button -->
    <button onclick="speakSentence()">Speak Sentence</button>

    <br><br>

    <!-- Return to Portfolio -->
    <a href="../index.html">
        Return to Portfolio Page
    </a>

    <script>

        // Show sentence based on selected word
        function showSentence() {

            const menu = document.getElementById("wordMenu");
            const sentenceBox = document.getElementById("sentenceBox");

            if (menu.selectedIndex > 0) {

                const selectedOption = menu.options[menu.selectedIndex];
                sentenceBox.value = selectedOption.dataset.sentence;

            } else {

                sentenceBox.value = "";

            }

        }

        // Web Speech API function
        function speak(textToSay) {

            const message = new SpeechSynthesisUtterance(textToSay);

            message.pitch = 1.2;
            message.rate = 1.0;

            window.speechSynthesis.speak(message);

        }

        // Speak selected word
        function speakWord() {

            const menu = document.getElementById("wordMenu");

            if (menu.selectedIndex > 0) {
                speak(menu.value);
            }

        }

        // Speak displayed sentence
        function speakSentence() {

            const sentenceBox = document.getElementById("sentenceBox");

            if (sentenceBox.value !== "") {
                speak(sentenceBox.value);
            }

        }

    </script>

</body>
</html>
